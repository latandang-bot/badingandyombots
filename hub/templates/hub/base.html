<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}badingandyombots{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    :root{
      --upcm-maroon:#7a0e1a;
      --upcm-maroon-2:#5d0b14;
      --upcm-gold:#c9a227;
      --paper:#fbf7f1;
      --ink:#1e1e1e;
      --soft: 18px;
    }
    body{ background: var(--paper); color:var(--ink); }
    .soft{ border-radius: var(--soft); }
    .card{ border:1px solid rgba(0,0,0,.08); box-shadow: 0 10px 30px rgba(0,0,0,.06); }
    .btn{ border-radius: 14px; }
    .btn-gold{ background: var(--upcm-gold); border:0; color:#1b1b1b; }
    .btn-gold:hover{ filter:brightness(.96); }
    .navbar{
      background: linear-gradient(90deg, var(--upcm-maroon), var(--upcm-maroon-2));
    }
    .navbar .btn-outline-light{ border-color: rgba(255,255,255,.55); }
    .navbar-brand{ letter-spacing:.5px; font-weight:700; }
    .dropdown-menu{ border-radius: 16px; }
  </style>
</head>

<body>
<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container">
    <a class="navbar-brand" href="{% url 'landing' %}">badingandyombots</a>

    <div class="ms-auto d-flex gap-2 flex-wrap align-items-center">
      {% if user.is_authenticated %}
        <a class="btn btn-outline-light btn-sm" href="{% url 'home' %}">Home</a>
        <a class="btn btn-outline-light btn-sm" href="{% url 'deadlines' %}">Deadlines</a>
        <a class="btn btn-outline-light btn-sm" href="{% url 'classes' %}">Schedule</a>

        <!-- Academics dropdown LU3-LU7 -->
        <div class="dropdown">
          <button class="btn btn-outline-light btn-sm dropdown-toggle" type="button" data-bs-toggle="dropdown">
            Academics
          </button>
          <ul class="dropdown-menu dropdown-menu-end">
            {% for u in nav_units %}
              <li><a class="dropdown-item" href="{% url 'unit_detail' u.id %}">{{ u.name }}</a></li>
            {% endfor %}
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item" href="{% url 'learning_units' %}">All Learning Units</a></li>
          </ul>
        </div>

        <a class="btn btn-outline-light btn-sm" href="{% url 'account' %}">Account</a>

        <!-- Django 5 logout MUST be POST -->
        <form method="post" action="{% url 'logout' %}" class="d-inline m-0 p-0">
          {% csrf_token %}
          <button type="submit" class="btn btn-gold btn-sm">Log out</button>
        </form>
      {% else %}
        <a class="btn btn-gold btn-sm" href="{% url 'login' %}">Log in</a>
      {% endif %}
    </div>
  </div>
</nav>

<main class="container py-4">
  {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
