{% extends "hub/base.html" %}
{% block title %}Login · badingandyombots{% endblock %}
{% block content %}

<div class="row justify-content-center">
  <div class="col-lg-5">
    <div class="card p-4 soft">
      <h3 class="mb-1">Log in</h3>
      <div class="text-muted small mb-3">Wag Ka Na Pumasok Bading.</div>

      {% if form.errors %}
        <div class="alert alert-danger soft">
          Please check your username/password.
        </div>
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label small text-muted">Username</label>
          <input class="form-control" type="text" name="username" autofocus required>
        </div>

        <div class="mb-3">
          <label class="form-label small text-muted">Password</label>
          <input class="form-control" type="password" name="password" required>
        </div>

        <button class="btn btn-gold w-100" type="submit">Log in</button>
      </form>

      <div class="mt-3 text-center">
        <a class="text-muted small" href="{% url 'password_reset' %}">Forgot password?</a>
      </div>
    </div>
  </div>
</div>

{% endblock %}
